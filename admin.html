<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | PlushByTanya</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .login-screen {
      min-height: 100vh;
      background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('/images/bg.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      padding: 36px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      text-align: center;
    }

    .login-box h1 {
      margin: 0 0 24px;
      font-size: 34px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-bottom: 14px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      box-sizing: border-box;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 6px;
    }

    button:hover {
      opacity: 0.85;
    }

    .login-btn {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      font-size: 18px;
    }

    .error {
      color: #dc2626;
      margin-top: 14px;
      font-weight: bold;
    }

    .admin {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
      display: none;
    }

    .admin.active {
      display: block;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 38px;
      margin: 0;
    }

    .box {
      background: white;
      padding: 24px;
      border-radius: 18px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h2, h3 {
      margin-top: 0;
    }

    .danger {
      background: #dc2626;
    }

    .green {
      background: #16a34a;
    }

    .preview {
      max-width: 220px;
      max-height: 220px;
      display: block;
      margin: 10px 0;
      border-radius: 12px;
      background: #eee;
    }

    .hint {
      color: #666;
      font-size: 14px;
      margin-top: -6px;
      margin-bottom: 12px;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .tab-btn {
      background: #e5e7eb;
      color: #111;
    }

    .tab-btn.active {
      background: #111;
      color: white;
    }

    .admin-section {
      display: none;
    }

    .admin-section.active {
      display: block;
    }

    .orders-grid {
      display: grid;
      gap: 14px;
    }

    .order-card-admin {
      border: 1px solid #ddd;
      padding: 18px;
      border-radius: 16px;
      background: #fafafa;
    }

    .order-status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      background: #f59e0b;
      color: white;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .order-status.done {
      background: #16a34a;
    }

    .empty {
      color: #777;
      font-size: 18px;
    }

    @media (max-width: 700px) {
      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 30px;
      }

      .box {
        padding: 18px;
      }

      button {
        width: 100%;
        margin-right: 0;
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/admin-D4iX5Ark.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/data-unhnaqfr.js">
</head>

<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>Вхід в адмінку</h1>

      <input id="loginInput" placeholder="Логін">
      <input id="passwordInput" type="password" placeholder="Пароль">

      <button onclick="login()" class="login-btn">Увійти</button>

      <p id="errorMsg" class="error"></p>
    </div>
  </section>

  <main id="adminPanel" class="admin">
    <div class="top">
      <h1>Адмінка PlushByTanya</h1>
      <button onclick="logout()" class="danger">Вийти</button>
    </div>

    <p>
      <a href="/">← На сайт</a>
    </p>

    <div class="tabs">
      <button class="tab-btn active" onclick="openAdminTab('orders', this)">Замовлення</button>
      <button class="tab-btn" onclick="openAdminTab('products', this)">Товари</button>
      <button class="tab-btn" onclick="openAdminTab('gallery', this)">Галерея</button>
      <button class="tab-btn" onclick="openAdminTab('service', this)">Сервіс</button>
    </div>

    <section id="tab-orders" class="admin-section active">
      <section class="box">
        <h2>Замовлення</h2>
        <div id="ordersList" class="orders-grid"></div>
      </section>
    </section>

    <section id="tab-products" class="admin-section">
      <section class="box">
        <h2>Додати товар</h2>

        <input id="titleUa" placeholder="Назва UA">
        <input id="titleEn" placeholder="Назва EN">
        <input id="descUa" placeholder="Опис UA">
        <input id="descEn" placeholder="Опис EN">
        <input id="image" placeholder="/images/xxx.jpg">

        <p class="hint">Фото має лежати в папці public/images</p>

        <button onclick="addProduct()">Додати товар</button>
      </section>
    </section>

    <section id="tab-gallery" class="admin-section">
      <section class="box">
        <h2>Додати фото в галерею</h2>

        <input id="galleryImg" placeholder="/images/g7.jpg">
        <img id="galleryPreview" class="preview" alt="Preview">

        <button onclick="addGallery()" class="green">Додати фото</button>
      </section>

      <section class="box">
        <h3>Видалити фото з галереї</h3>

        <input id="deleteImage" placeholder="/images/g7.jpg">

        <button onclick="deleteImage()" class="danger">Видалити</button>
      </section>
    </section>

    <section id="tab-service" class="admin-section">
      <section class="box">
        <h3>Сервіс</h3>

        <button onclick="cleanGallery()">Очистити биті записи</button>
        <button onclick="resetData()" class="danger">Скинути всі зміни</button>
        <button onclick="clearOrders()" class="danger">Очистити всі замовлення</button>
      </section>
    </section>
  </main>

</body>
</html>
